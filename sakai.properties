###############################################################
# BASIC SAKAI SETTINGS
###############################################################

ui.service=Sakai
version.service=23
test=false
search.enable=true

###############################################################
# MULTI-SUBDOMAIN SUPPORT (CRITICAL)
###############################################################

# Allow Sakai to work with multiple hostnames
sakai.enable.multi.server=true

# Use the host sent by Nginx
serverNameHeader=X-Forwarded-Host

# Do NOT hardcode hostname
serverName=

# Let Sakai build URLs dynamically
portal.useAutoDetectedSiteUrl=true

# Portal path
portal.url=/portal

###############################################################
# REVERSE PROXY (NGINX) TRUST
###############################################################

# Trust headers coming from Nginx
request.headers.trusted=true

proxy.host.header=X-Forwarded-Host
proxy.proto.header=X-Forwarded-Proto
proxy.for.header=X-Forwarded-For

###############################################################
# SECURITY SETTINGS
###############################################################

# Enable built-in security headers
portal.security.headers.enabled=true

# Session cookie
sakai.cookieName=SAKAISESSID
session.cookie.secure=true

# Allow subdomain embedding if needed
content.separateDomains=false

###############################################################
# DATABASE SETTINGS
###############################################################

# Disable schema auto updates after first installation
auto.ddl=false

username@javax.sql.BaseDataSource=sakaiuser
password@javax.sql.BaseDataSource=sakaipassword

vendor@org.sakaiproject.db.api.SqlService=mysql
driverClassName@javax.sql.BaseDataSource=com.mysql.cj.jdbc.Driver

url@javax.sql.BaseDataSource=jdbc:mysql://db:3306/sakaidatabase?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true

hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

validationQuery@javax.sql.BaseDataSource=

defaultTransactionIsolationString@javax.sql.BaseDataSource=TRANSACTION_READ_COMMITTED
